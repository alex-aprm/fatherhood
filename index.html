<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Father — book for fathers-to-be / Отец — книга для будущих отцов</title>
<style>
:root {
  --fg: #1b1b1b;
  --muted: #666;
  --accent: #6e4a23;
  --bg: #fdfaf5;
  --rule: #d8cfbf;
}
html, body { background: var(--bg); color: var(--fg); }
body {
  font-family: 'Charter', 'Georgia', 'Times New Roman', serif;
  font-size: 18px;
  line-height: 1.6;
  margin: 0;
  padding: 0;
  -webkit-text-size-adjust: 100%;
  hyphens: auto;
}
main { max-width: 36em; margin: 0 auto; padding: 1em 1.2em 4em 1.2em; }
.topbar {
  max-width: 36em;
  margin: 0 auto;
  padding: 0.8em 1.2em;
  display: flex;
  justify-content: space-between;
  font-size: 0.9em;
  color: var(--muted);
  border-bottom: 1px solid var(--rule);
}
.topbar a { color: var(--muted); text-decoration: none; }
.topbar a:hover { color: var(--accent); }
h1 { font-size: 1.8em; font-weight: normal; margin: 1.2em 0 0.6em; line-height: 1.25; }
h2 { font-size: 1.45em; font-weight: normal; margin: 1.8em 0 0.5em; line-height: 1.3; border-top: 1px solid var(--rule); padding-top: 1em; }
h3 { font-size: 1.15em; font-weight: bold; margin: 1.5em 0 0.4em; }
p { margin: 0 0 0.9em; text-align: justify; }
blockquote {
  margin: 1em 0; padding: 0.6em 1em;
  border-left: 3px solid var(--accent);
  background: #f6f0e3;
  color: #4a3e2a;
}
blockquote p { margin: 0.3em 0; }
ul, ol { padding-left: 1.4em; }
li { margin-bottom: 0.3em; }
hr { border: none; border-top: 1px solid var(--rule); margin: 2.5em 0; }
a { color: var(--accent); }
code {
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 0.9em;
  background: #f1ece0;
  padding: 0.05em 0.3em;
  border-radius: 3px;
}
footer {
  max-width: 36em; margin: 0 auto; padding: 1.5em 1.2em 3em;
  font-size: 0.85em; color: var(--muted); border-top: 1px solid var(--rule); text-align: center;
}
footer a { color: var(--muted); }
@media (max-width: 600px) {
  body { font-size: 17px; }
  main, .topbar, footer { padding-left: 1em; padding-right: 1em; }
}

.cover { text-align: center; padding: 4em 1.2em 2em; }
.cover h1 { font-size: 1.6em; margin-bottom: 0.2em; }
.cover .sub { color: var(--muted); margin-bottom: 3em; }
.choices { display: flex; flex-direction: column; gap: 1em; max-width: 26em; margin: 0 auto; }
.choice {
  display: block; padding: 1.2em 1.4em; border: 1px solid var(--rule);
  border-radius: 6px; text-decoration: none; color: var(--fg);
  background: white; transition: border-color 0.15s, transform 0.15s;
}
.choice:hover { border-color: var(--accent); transform: translateY(-1px); }
.choice .lang { font-weight: bold; font-size: 1.1em; }
.choice .meta { color: var(--muted); font-size: 0.9em; margin-top: 0.3em; }
</style>
</head>
<body>
<main class="cover">
  <h1>Отец. Книга для тех, кто только собирается</h1>
  <div class="sub">Father — a book for those just about to become one</div>
  <div class="choices">
    <a class="choice" href="russian.html">
      <div class="lang">Читать по-русски</div>
      <div class="meta">Оригинал · personal non-fiction</div>
    </a>
    <a class="choice" href="english.html">
      <div class="lang">Read in English</div>
      <div class="meta">Machine translation from Russian</div>
    </a>
  </div>
</main>
<footer>
  <p>Free to read. <a href="https://buymeacoffee.com/alexaprm">Support the author</a>.</p>
</footer>
<script data-goatcounter="https://alex-aprm.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
